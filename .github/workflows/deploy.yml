name: Deploy Version

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tagged code
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: deploy

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Copy site files
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          rm -rf "deploy/$VERSION"
          mkdir -p "deploy/$VERSION"
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            source/ "deploy/$VERSION/"

      - name: Update root redirect
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          cat > deploy/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=$VERSION/">
            <title>Redirecting…</title>
          </head>
          <body>
            <p><a href="$VERSION/">Redirecting to $VERSION…</a></p>
          </body>
          </html>
          EOF

      - name: Commit and push
        run: |
          cd deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy ${{ steps.version.outputs.tag }}"
          git push
